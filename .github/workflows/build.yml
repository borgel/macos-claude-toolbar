name: Build
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - run: ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageBar
          path: build/Build/Products/Release/ClaudeUsageBar.app
